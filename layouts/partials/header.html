<header id="banner" class="site-nav">
    <div class="nav-inner">
        <a class="nav-brand" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        <nav class="nav-links" aria-label="メインメニュー">
            {{ $current := . -}}
            {{ range .Site.Menus.main.ByWeight -}}
                {{ $active := or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) -}}
                <a href="{{ .URL }}" title="{{ .Title }}"{{ if $active }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
            {{- end }}
            <span class="nav-sep" aria-hidden="true">·</span>
            <a href="https://instagram.com/saz.jp" rel="me" target="_blank" class="nav-social" aria-label="Instagram" title="Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            </a>
            <a href="https://www.youtube.com/@sazjp/videos" rel="me" target="_blank" class="nav-social" aria-label="YouTube" title="YouTube">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="2" y="5" width="20" height="14" rx="3" ry="3"/><polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/></svg>
            </a>
        </nav>
    </div>
</header>
